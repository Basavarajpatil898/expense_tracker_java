 
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="css/style.css">
    <title>FinTrack Pro - Expense Tracker</title>
</head>
<body>
<div class="container">
    <h1>FinTrack Pro (Expense Tracker)</h1>
    <form action="addExpense" method="post">
        <input type="date" name="date" required placeholder="Date">
        <input type="text" name="category" placeholder="Category (e.g., Food)" required>
        <input type="number" step="0.01" name="amount" placeholder="Amount" required>
        <input type="text" name="description" placeholder="Description">
        <button type="submit">Add Expense</button>
    </form>
    <br>
    <a href="view"> View History</a> | <a href="analyze.html"> Spending Analysis</a>
</div>
</body>
</html>
